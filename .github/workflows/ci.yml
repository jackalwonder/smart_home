name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_plaintext_secrets.py

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev]"
      - run: python -m ruff check src tests
      - run: python -m pytest tests/unit -q
      - run: python -m pytest tests/integration -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - contracts
    env:
      CONNECTION_ENCRYPTION_SECRET: ci-connection-secret-value-000001
      ACCESS_TOKEN_SECRET: ci-access-token-secret-value-000001
      BOOTSTRAP_TOKEN_SECRET: ci-bootstrap-token-secret-value-0001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: docker compose up -d --build postgres redis backend frontend
      - run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:25173/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "frontend did not become ready in time" >&2
          exit 1
      - run: npm run test:e2e
        working-directory: frontend
      - if: failure()
        run: docker compose logs --no-color backend frontend postgres redis homeassistant
      - if: always()
        run: docker compose down -v

  contracts:
    name: Contract Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install --upgrade pip
        working-directory: backend
      - run: python -m pip install .
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm run generate:api-types
        working-directory: frontend
      - run: git diff --exit-code -- backend/openapi.json backend/realtime.schema.json frontend/src/api/types.generated.ts frontend/src/ws/realtime.generated.ts
