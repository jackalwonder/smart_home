services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-25173}:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-docker}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://smart_home:smart_home@postgres:5432/smart_home}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TZ: ${TZ:-Asia/Shanghai}
      CONNECTION_ENCRYPTION_SECRET: ${CONNECTION_ENCRYPTION_SECRET:-smart-home-local-secret}
      HOME_ASSISTANT_BOOTSTRAP_ENABLED: ${HOME_ASSISTANT_BOOTSTRAP_ENABLED:-true}
      HOME_ASSISTANT_BOOTSTRAP_URL: ${HOME_ASSISTANT_BOOTSTRAP_URL:-http://homeassistant:8123}
      HOME_ASSISTANT_BOOTSTRAP_ACCESS_TOKEN: ${HOME_ASSISTANT_BOOTSTRAP_ACCESS_TOKEN:-}
      HOME_ASSISTANT_BOOTSTRAP_CONNECTION_MODE: ${HOME_ASSISTANT_BOOTSTRAP_CONNECTION_MODE:-TOKEN}
      BOOTSTRAP_TOKEN_SECRET: ${BOOTSTRAP_TOKEN_SECRET:-smart-home-local-bootstrap-token-secret}
      BOOTSTRAP_TOKEN_TTL_SECONDS: ${BOOTSTRAP_TOKEN_TTL_SECONDS:-2592000}
      BOOTSTRAP_TOKEN_LEEWAY_SECONDS: ${BOOTSTRAP_TOKEN_LEEWAY_SECONDS:-0}
      SGCC_QR_CODE_FILE: ${SGCC_QR_CODE_FILE:-/app/backend/sgcc/login_qr_code.png}
      SGCC_CACHE_FILE: ${SGCC_CACHE_FILE:-/app/backend/sgcc/sgcc_cache.json}
      SGCC_DOCKER_SOCKET_PATH: ${SGCC_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      SGCC_DOCKER_CONTAINER_NAME: ${SGCC_DOCKER_CONTAINER_NAME:-smart-home-sgcc-electricity}
    ports:
      - "${APP_PORT:-28000}:8000"
    volumes:
      - backend_storage:/app/backend/storage
      - ./deploy/sgcc_electricity:/app/backend/sgcc
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      homeassistant:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${HOME_ASSISTANT_PORT:-28123}:8123"
    volumes:
      - ./deploy/homeassistant/config:/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8123/', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  sgcc_electricity:
    build:
      context: ./services/sgcc_electricity_direct_qrcode
      dockerfile: Dockerfile
    image: smart-home-sgcc-electricity-direct-qrcode:local
    container_name: ${SGCC_DOCKER_CONTAINER_NAME:-smart-home-sgcc-electricity}
    restart: unless-stopped
    env_file:
      - ./deploy/sgcc_electricity/.env
    environment:
      SET_CONTAINER_TIMEZONE: "true"
      CONTAINER_TIMEZONE: ${TZ:-Asia/Shanghai}
      DIRECT_QRCODE_LOGIN: "true"
      LOGIN_FALLBACK: "qrcode"
    command: python3 main.py
    init: true
    volumes:
      - ./deploy/sgcc_electricity:/data
    depends_on:
      homeassistant:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_home}
      POSTGRES_USER: ${POSTGRES_USER:-smart_home}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_home}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_home} -d ${POSTGRES_DB:-smart_home}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend_storage:
  postgres_data:
  redis_data:
